apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-querier
  namespace: thanos
  labels:
    app: thanos-querier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thanos-querier
  template:
    metadata:
      labels:
        app: thanos-querier
    spec:
      containers:
        - name: thanos-querier
          image: quay.io/thanos/thanos:v0.35.1
          args:
            - query
            - --http-address=0.0.0.0:9091
            - --grpc-address=0.0.0.0:10901
            - --endpoint=thanos-sidecar.monitoring.svc.cluster.local:10901
            - --endpoint=thanos-store-gateway.thanos.svc.cluster.local:10901
            - --query.replica-label=replica
          ports:
            - name: http
              containerPort: 9091
            - name: grpc
              containerPort: 10901
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-querier
  namespace: thanos
  labels:
    app: thanos-querier
spec:
  selector:
    app: thanos-querier
  ports:
    - name: http
      port: 9091
      targetPort: 9091
    - name: grpc
      port: 10901
      targetPort: 10901
