apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-store-gateway
  namespace: thanos
  labels:
    app: thanos-store-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thanos-store-gateway
  template:
    metadata:
      labels:
        app: thanos-store-gateway
    spec:
      containers:
        - name: thanos-store-gateway
          image: quay.io/thanos/thanos:v0.35.1
          args:
            - store
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --data-dir=/data
          ports:
            - name: grpc
              containerPort: 10901
            - name: http
              containerPort: 10902
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
            - name: data
              mountPath: /data
      volumes:
        - name: objstore-config
          secret:
            secretName: thanos-objstore-secret
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-store-gateway
  namespace: thanos
  labels:
    app: thanos-store-gateway
spec:
  selector:
    app: thanos-store-gateway
  ports:
    - name: grpc
      port: 10901
      targetPort: 10901
    - name: http
      port: 10902
      targetPort: 10902
